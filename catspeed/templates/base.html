<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}🐈 Cat Speed Trap{% endblock %}</title>
<style>
  :root {
    --bg: #0f1115; --panel: #1a1d24; --panel2: #232730;
    --ink: #e7ecf3; --muted: #8b93a7; --accent: #ffb454; --good: #54d186;
    --bar: #2b303b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  header { padding: 18px 20px; border-bottom: 1px solid #262b35; display: flex; justify-content: space-between; align-items: baseline; }
  header h1 { margin: 0; font-size: 20px; letter-spacing: .3px; }
  header h1 a { color: inherit; text-decoration: none; }
  header nav a { color: var(--muted); font-size: 13px; text-decoration: none; }
  header nav a:hover { color: var(--ink); }
  .wrap { max-width: 920px; margin: 0 auto; padding: 20px; }
  .grid { display: grid; gap: 16px; }
  @media (min-width: 720px) { .cols { grid-template-columns: 1.2fr 1fr; } }
  .card { background: var(--panel); border: 1px solid #262b35; border-radius: 14px; padding: 18px; }
  .card h2 { margin: 0 0 12px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

  .speedo { text-align: center; padding: 8px 0 4px; }
  .speedo .big { font-size: 84px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
  .speedo .unit { font-size: 22px; color: var(--muted); margin-left: 6px; }
  .speedo.hot .big { color: var(--accent); text-shadow: 0 0 24px rgba(255,180,84,.5); }

  .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 14px; }
  .stat { background: var(--panel2); border-radius: 10px; padding: 10px 12px; }
  .stat .n { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat .l { font-size: 12px; color: var(--muted); }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 7px 8px; font-variant-numeric: tabular-nums; }
  th { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); border-bottom: 1px solid #2b303b; }
  tbody tr:nth-child(odd) { background: #181b22; }
  td.rank { color: var(--muted); width: 28px; }
  .pill { background: var(--good); color: #0b2417; border-radius: 20px; padding: 1px 8px; font-size: 11px; font-weight: 700; }

  label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
  input[type=number] { width: 100%; padding: 9px 10px; border-radius: 9px; border: 1px solid #303642;
    background: #11141a; color: var(--ink); font-size: 15px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; }
  .row > div { flex: 1; min-width: 120px; }
  button { cursor: pointer; border: 0; border-radius: 9px; padding: 10px 14px; font-weight: 600; font-size: 14px; }
  button.primary { background: var(--accent); color: #2a1b00; }
  button.ghost { background: var(--panel2); color: var(--ink); border: 1px solid #303642; }
  button.danger { color: #ff7a7a; border-color: #5a2c2c; }
  button:disabled { opacity: .45; cursor: default; }
  .muted { color: var(--muted); font-size: 13px; }
  .statusbar { display: flex; align-items: center; gap: 8px; background: var(--panel);
    border: 1px solid #262b35; border-radius: 12px; padding: 10px 16px; font-size: 14px; }
  .statusbar .sep { color: #3a4150; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); flex: 0 0 auto; }
  .statusbar.running .dot { background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse 1s infinite; }
  .statusbar.running #statusText { color: var(--accent); font-weight: 700; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .heatwrap { overflow-x: auto; padding-bottom: 4px; }
  .heatmonths { display: grid; grid-auto-flow: column; grid-auto-columns: 15px;
    font-size: 10px; color: var(--muted); height: 14px; margin-bottom: 2px; }
  .heatmonths span { grid-row: 1; white-space: nowrap; }
  .heatmap { display: grid; grid-auto-flow: column; grid-template-rows: repeat(7, 12px);
    grid-auto-columns: 12px; gap: 3px; }
  .hm { width: 12px; height: 12px; border-radius: 3px; background: var(--bar); display: inline-block; }
  .hm.hm0 { background: #20242d; }
  .hm.hm1 { background: #5a4020; }
  .hm.hm2 { background: #8f6127; }
  .hm.hm3 { background: #cc8f3d; }
  .hm.hm4 { background: var(--accent); box-shadow: 0 0 6px rgba(255,180,84,.35); }
  .hm.future { background: transparent; }
  .hm:not(.future):hover { outline: 1px solid var(--ink); outline-offset: 1px; }
  .heatfoot { display: flex; justify-content: space-between; align-items: center;
    margin-top: 10px; gap: 10px; flex-wrap: wrap; }
  .heatlegend { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; }
  .toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--good); color: #08230f; padding: 10px 18px; border-radius: 24px;
    font-weight: 700; opacity: 0; transition: opacity .25s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1><a href="/">🐈‍⬛ Cat Speed Trap</a></h1>
  <nav>{% block nav %}<a href="/calibrate">🔧 calibration</a>{% endblock %}</nav>
</header>
<div class="wrap grid">
{% block content %}{% endblock %}
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const socket = io();

  let toastTimer;
  function toast(msg) {
    const t = $("toast");
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
  }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
